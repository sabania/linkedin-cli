name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: linkedin-cli
            archive: linkedin-cli-windows.zip
          - os: macos-latest
            name: linkedin-cli-macos
            archive: linkedin-cli-macos.tar.gz
          - os: ubuntu-latest
            name: linkedin-cli-linux
            archive: linkedin-cli-linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify selenium installed
        run: python -c "import selenium; print(f'selenium {selenium.__version__} at {selenium.__file__}')"

      - name: Build binary
        run: pyinstaller --clean --name ${{ matrix.name }} --collect-all selenium --hidden-import selenium --hidden-import selenium.webdriver --hidden-import selenium.webdriver.chrome --hidden-import selenium.webdriver.chrome.options --hidden-import selenium.webdriver.chrome.service --hidden-import selenium.webdriver.chrome.webdriver --hidden-import selenium.webdriver.chromium --hidden-import selenium.webdriver.chromium.webdriver --hidden-import selenium.webdriver.common --hidden-import selenium.webdriver.remote --hidden-import selenium.webdriver.remote.webdriver --hidden-import selenium.webdriver.remote.errorhandler --hidden-import typer --hidden-import typer.core --hidden-import typer.main --hidden-import click --hidden-import rich --hidden-import rich.console --hidden-import rich.table --hidden-import auth --hidden-import linkedin_wrapper --hidden-import commands --hidden-import commands.profile --hidden-import commands.feed --hidden-import commands.posts --hidden-import commands.connections --hidden-import commands.search --hidden-import commands.messaging --hidden-import commands.jobs --hidden-import commands.company main.py

      - name: Fix permissions (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/${{ matrix.name }}/${{ matrix.name }}
          find dist/${{ matrix.name }}/_internal -name "selenium-manager" -exec chmod +x {} +
          find dist/${{ matrix.name }}/_internal -name "*.so" -exec chmod +x {} +

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/${{ matrix.name }}/* -DestinationPath dist/${{ matrix.archive }}
        shell: pwsh

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: cd dist && tar -czf ${{ matrix.archive }} ${{ matrix.name }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
